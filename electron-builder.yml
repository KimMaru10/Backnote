appId: com.backnote.app
productName: Backnote
publish:
  provider: github
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!backend/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
mac:
  icon: build/icon.icns
  extraResources:
    - from: backend/dist/darwin/${arch}/
      to: backend
      filter:
        - backnote-backend*
  artifactName: ${name}-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
win:
  icon: build/icon.ico
  extraResources:
    - from: backend/dist/win32/x64/
      to: backend
      filter:
        - backnote-backend*
  artifactName: ${name}-${version}-setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
linux:
  icon: build/icon.png
  extraResources:
    - from: backend/dist/linux/x64/
      to: backend
      filter:
        - backnote-backend*
  artifactName: ${name}-${version}-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
